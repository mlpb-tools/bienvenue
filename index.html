<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LS4YOU — Bienvenue à la Mission Locale Pays Basque</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#FFD166;--cream:#FFF8ED;--black:#111111;--white:#FFFFFF;
  --pink:#E91E8C;--cyan:#00B4D8;--green:#06D6A0;--orange:#FF6B35;--purple:#7B5EA7;
  --border:2.5px solid var(--black);
  --r:clamp(10px,2.5vw,16px);--rb:clamp(16px,3.5vw,22px);
  --pad:clamp(14px,4.5vw,28px);--gap:clamp(8px,2vw,12px);
  --fs-xs:clamp(10px,2.5vw,12px);--fs-sm:clamp(11px,2.8vw,13px);
  --fs-md:clamp(13px,3.2vw,15px);--fs-lg:clamp(16px,4vw,20px);
  --fs-xl:clamp(22px,6vw,30px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);display:flex;justify-content:center;align-items:flex-start;padding:clamp(0px,2vw,16px);min-height:100vh;min-height:100dvh}
.app{width:100%;max-width:680px;background:var(--white);border-radius:clamp(0px,3vw,24px);overflow:hidden;border:var(--border);box-shadow:6px 6px 0 var(--black)}
@media(max-width:480px){body{padding:0}.app{border-radius:0;border-left:none;border-right:none;box-shadow:none;min-height:100dvh}}
.step{display:none}.step.active{display:block}
.topbar{background:var(--yellow);border-bottom:var(--border);padding:clamp(10px,2.5vw,14px) var(--pad);display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar-logo{height:clamp(24px,6vw,34px);width:auto;flex-shrink:0}
.topbar-badge{background:var(--pink);color:#fff;font-weight:900;font-size:var(--fs-xs);letter-spacing:.07em;padding:5px clamp(10px,2.5vw,16px);border-radius:25px;border:2px solid var(--black);text-transform:uppercase;box-shadow:2px 2px 0 var(--black);white-space:nowrap}
.hero{background:var(--yellow);padding:clamp(1.2rem,4vw,2rem) var(--pad) clamp(1rem,3vw,1.5rem);text-align:center;position:relative;border-bottom:var(--border)}
.hero-eyebrow{font-weight:800;font-size:var(--fs-xs);letter-spacing:.08em;text-transform:uppercase;color:var(--black);margin-bottom:6px}
.hero-title{font-weight:900;font-size:var(--fs-xl);color:var(--black);line-height:1.05;margin-bottom:6px}
.hero-title-block{display:inline-block;background:var(--black);color:var(--white);padding:2px clamp(6px,2vw,12px);border-radius:5px}
.hero-sub{font-size:var(--fs-sm);color:var(--black);opacity:.7;line-height:1.6;max-width:400px;margin:0 auto clamp(1rem,3vw,1.5rem)}
.pills{display:flex;flex-wrap:wrap;gap:var(--gap);justify-content:center;margin-bottom:clamp(.8rem,2.5vw,1.25rem)}
.pill{display:flex;align-items:center;gap:5px;border-radius:25px;padding:5px clamp(10px,2.5vw,14px);font-weight:800;font-size:var(--fs-xs);border:2px solid var(--black);background:var(--white);box-shadow:2px 2px 0 var(--black);pointer-events:none}
.istrip{background:var(--white);border-radius:var(--r);border:var(--border);padding:clamp(10px,2.5vw,14px) var(--pad);font-size:var(--fs-sm);color:var(--black);text-align:center;margin:0 var(--pad) clamp(1rem,3vw,1.5rem);line-height:1.5;box-shadow:3px 3px 0 var(--black)}
.istrip b{font-weight:900}
.snav{display:flex;align-items:center;justify-content:space-between;padding:clamp(.8rem,2.5vw,1rem) var(--pad);background:var(--yellow);border-top:var(--border);padding-bottom:max(clamp(.8rem,2.5vw,1rem),env(safe-area-inset-bottom))}
.dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.2);border:1.5px solid var(--black);transition:all .2s;pointer-events:none}
.dot.done{background:var(--black)}.dot.active{width:22px;border-radius:5px;background:var(--black)}
.btn-start,.btn-next{cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;font-size:var(--fs-sm);background:var(--black);color:var(--white);border:var(--border);border-radius:25px;padding:clamp(10px,2.5vw,13px) clamp(18px,4vw,28px);box-shadow:3px 3px 0 rgba(0,0,0,.3);transition:transform .12s,box-shadow .12s;min-height:44px;white-space:nowrap}
.btn-start:hover,.btn-next:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(0,0,0,.3)}
.btn-start:active,.btn-next:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,.3)}
.btn-back{cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:var(--fs-xs);background:transparent;color:var(--black);border:2px solid var(--black);border-radius:25px;padding:clamp(8px,2vw,11px) clamp(14px,3vw,22px);transition:background .15s;min-height:44px;white-space:nowrap}
.btn-back:hover{background:rgba(0,0,0,.06)}.btn-back:active{background:rgba(0,0,0,.12)}
.dhead{padding:0}
.dhead-color{padding:clamp(1rem,3vw,1.4rem) var(--pad) clamp(.8rem,2.5vw,1.1rem);border-bottom:var(--border)}
.dtag-inner{display:inline-flex;align-items:center;gap:7px;border-radius:25px;padding:6px clamp(12px,3vw,18px);font-weight:900;font-size:var(--fs-sm);border:2px solid var(--black);box-shadow:2px 2px 0 var(--black);margin-bottom:6px}
.ddesc{font-size:var(--fs-xs);color:var(--black);opacity:.65}
.qb{padding:clamp(1rem,3vw,1.4rem) var(--pad) 0}
.qlbl{font-size:var(--fs-xs);font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;color:rgba(0,0,0,.5)}
.qtxt{font-weight:900;font-size:var(--fs-md);color:var(--black);line-height:1.3;margin-bottom:4px}
.qhint{font-size:var(--fs-xs);color:rgba(0,0,0,.5);margin-bottom:10px}
.sdis{border-radius:var(--r);padding:clamp(12px,3vw,16px);text-align:center;margin-bottom:8px;border:2px solid var(--black);display:block;min-height:66px;box-shadow:3px 3px 0 var(--black)}
.semi,.slbl{pointer-events:none;display:block}
.semi{font-size:clamp(24px,6vw,30px);margin-bottom:4px}
.slbl{font-weight:900;font-size:var(--fs-sm)}
input[type=range]{width:100%;margin:4px 0;cursor:pointer;accent-color:var(--black);height:22px}
.sticks{display:flex;justify-content:space-between;font-size:var(--fs-xs);color:rgba(0,0,0,.4);font-weight:800;pointer-events:none}
.og{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap)}
.og.c3{grid-template-columns:repeat(3,1fr)}
@media(max-width:360px){.og.c3{grid-template-columns:repeat(2,1fr)}}
.oc{border:2px solid rgba(0,0,0,.15);border-radius:var(--r);padding:clamp(10px,2.5vw,14px) clamp(8px,2vw,12px);cursor:pointer;text-align:center;background:var(--white);transition:all .15s;user-select:none;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.oc:hover{border-color:var(--black);box-shadow:3px 3px 0 var(--black);transform:translate(-1px,-1px)}
.oc:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--black)}
.oc *{pointer-events:none}
.sr{border-color:var(--pink)!important;background:#FFF0F8!important;box-shadow:3px 3px 0 var(--pink)!important}
.sy{border-color:#E5A000!important;background:var(--yellow)!important;box-shadow:3px 3px 0 #E5A000!important}
.st{border-color:var(--cyan)!important;background:#E0F7FA!important;box-shadow:3px 3px 0 var(--cyan)!important}
.so{border-color:var(--orange)!important;background:#FFF0E8!important;box-shadow:3px 3px 0 var(--orange)!important}
.sp{border-color:var(--purple)!important;background:#F0ECFF!important;box-shadow:3px 3px 0 var(--purple)!important}
.sg{border-color:var(--green)!important;background:#E6FBF5!important;box-shadow:3px 3px 0 var(--green)!important}
.spk{border-color:var(--pink)!important;background:#FFF0F8!important;box-shadow:3px 3px 0 var(--pink)!important}
.oemi{font-size:clamp(18px,5vw,24px);margin-bottom:5px}
.olbl{font-weight:900;font-size:var(--fs-xs);color:var(--black);line-height:1.2}
.odesc{font-size:clamp(9px,2.2vw,11px);color:rgba(0,0,0,.5);margin-top:3px;line-height:1.3}
.pzb{display:flex;gap:3px;padding:0 var(--pad);margin:clamp(.8rem,2.5vw,1.2rem) 0 0;flex-wrap:wrap;pointer-events:none}
.pz{height:5px;border-radius:3px}
.nbar{display:flex;align-items:center;justify-content:space-between;padding:clamp(.8rem,2.5vw,1rem) var(--pad);border-top:var(--border);gap:8px;padding-bottom:max(clamp(.8rem,2.5vw,1rem),env(safe-area-inset-bottom))}
@media(max-width:360px){.nbar{flex-wrap:wrap;gap:10px}.nbar .dots{order:3;width:100%;justify-content:center}}
.dest-wrap{padding:var(--pad)}
.dest-header{background:var(--yellow);border:var(--border);border-radius:var(--rb);padding:clamp(1rem,3.5vw,1.5rem);text-align:center;margin-bottom:clamp(.8rem,2.5vw,1.25rem);box-shadow:4px 4px 0 var(--black)}
.dest-title{font-weight:900;font-size:var(--fs-lg);color:var(--black);margin-bottom:4px}
.dest-sub{font-size:var(--fs-sm);color:var(--black);opacity:.65;max-width:360px;margin:0 auto .4rem}
.mhint{font-size:var(--fs-xs);color:rgba(0,0,0,.5)}
.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap)}
.dc2{border-radius:var(--r);padding:clamp(12px,3vw,18px) clamp(10px,2.5vw,14px);cursor:pointer;text-align:center;border:2px solid rgba(0,0,0,.15);background:var(--white);transition:all .18s;user-select:none;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dc2:hover{border-color:var(--black);box-shadow:3px 3px 0 var(--black);transform:translate(-1px,-1px)}
.dc2:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--black)}
.dc2.sel{border-color:var(--black)!important;box-shadow:4px 4px 0 var(--black)!important;transform:translate(-2px,-2px)}
.dc2 *{pointer-events:none}
.demi{font-size:clamp(24px,6vw,32px);margin-bottom:6px}
.dname{font-weight:900;font-size:var(--fs-sm);line-height:1.2;margin-bottom:3px}
.ddesc2{font-size:clamp(9px,2.2vw,11px);line-height:1.3;opacity:.65}
.chip-grid{display:flex;flex-wrap:wrap;gap:var(--gap)}
.fchip{display:flex;align-items:center;gap:6px;border:2px solid rgba(0,0,0,.2);border-radius:25px;padding:clamp(6px,1.8vw,9px) clamp(10px,2.5vw,15px);cursor:pointer;background:var(--white);font-weight:800;font-size:var(--fs-xs);color:var(--black);transition:all .15s;user-select:none;min-height:38px}
.fchip *{pointer-events:none}
.fchip:hover{border-color:var(--black);box-shadow:2px 2px 0 var(--black);transform:translate(-1px,-1px)}
.fchip:active{transform:translate(1px,1px);box-shadow:none}
.fchip.fc-sr{border-color:var(--pink);background:#FFF0F8;box-shadow:2px 2px 0 var(--pink)}
.fchip.fc-sy{border-color:#E5A000;background:var(--yellow);box-shadow:2px 2px 0 #E5A000}
.fchip.fc-sp{border-color:var(--purple);background:#F0ECFF;box-shadow:2px 2px 0 var(--purple)}
.fchip-icon{font-size:clamp(13px,3.5vw,16px)}
.rpage{padding:var(--pad)}
.r-hero{background:var(--yellow);border:var(--border);border-radius:var(--rb);padding:clamp(1rem,4vw,1.5rem);text-align:center;margin-bottom:clamp(.8rem,2.5vw,1.25rem);box-shadow:4px 4px 0 var(--black)}
.rtitle{font-weight:900;font-size:var(--fs-lg);color:var(--black);margin-bottom:4px}
.rsub{font-size:var(--fs-xs);color:var(--black);opacity:.6;letter-spacing:.04em;text-transform:uppercase;font-weight:800}
.serv-card{border-radius:var(--r);padding:clamp(10px,2.5vw,14px) clamp(12px,3vw,16px);margin-bottom:var(--gap);display:flex;align-items:flex-start;gap:10px;border:2px solid rgba(0,0,0,.12);background:var(--white);transition:all .15s}
.serv-card:hover{border-color:var(--black);box-shadow:3px 3px 0 var(--black);transform:translate(-1px,-1px)}
.serv-icon{font-size:clamp(18px,4.5vw,22px);flex-shrink:0;margin-top:2px;pointer-events:none}
.serv-body{flex:1;min-width:0}
.serv-title{font-weight:900;font-size:var(--fs-sm);margin-bottom:3px;color:var(--black)}
.serv-desc{font-size:var(--fs-xs);line-height:1.45;color:rgba(0,0,0,.6);margin-bottom:7px}
.serv-link{display:inline-flex;align-items:center;gap:4px;font-size:var(--fs-xs);font-weight:900;padding:5px clamp(10px,2.5vw,14px);border-radius:12px;text-decoration:none;border:2px solid var(--black);box-shadow:2px 2px 0 var(--black);transition:transform .12s;min-height:36px}
.serv-link:hover{transform:translate(-1px,-1px)}.serv-link:active{transform:translate(1px,1px);box-shadow:none}
.pts-chip{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px clamp(8px,2vw,12px);font-weight:800;font-size:var(--fs-xs);margin:3px;border:1.5px solid rgba(0,0,0,.15)}
.bilan-intro{background:var(--cream);border-radius:var(--r);border:2px solid rgba(0,0,0,.1);padding:clamp(10px,2.5vw,14px) clamp(12px,3vw,16px);margin-bottom:clamp(.8rem,2.5vw,1.2rem);font-size:var(--fs-sm);color:var(--black);line-height:1.55;text-align:center}
.bilan-intro b{font-weight:900}
.sec-title{font-weight:900;font-size:var(--fs-xs);display:flex;align-items:center;gap:7px;margin:clamp(.8rem,2.5vw,1rem) 0 clamp(.4rem,1.5vw,.6rem);color:var(--black);text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid var(--black);padding-bottom:5px}
.rdv-block{background:var(--black);border-radius:var(--rb);padding:clamp(1rem,4vw,1.5rem);text-align:center;margin-top:.5rem;border:var(--border)}
.clea-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);margin-bottom:1rem}
@media(max-width:360px){.clea-grid{grid-template-columns:repeat(2,1fr)}}
.clea-tile{border-radius:var(--r);border:2px solid var(--black);padding:clamp(8px,2vw,12px) 8px;text-align:center;box-shadow:3px 3px 0 var(--black)}
.clea-tile-icon{font-size:clamp(16px,4.5vw,20px);margin-bottom:4px}
.clea-tile-lbl{font-weight:900;font-size:clamp(9px,2.3vw,11px);line-height:1.2;margin-bottom:6px;color:var(--black)}
.clea-badge{display:inline-block;border-radius:8px;padding:2px 8px;font-size:clamp(9px,2.2vw,11px);font-weight:800;color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.25);border-radius:4px}
:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}
@media print{body{background:#fff;padding:0}.app{box-shadow:none;border:1px solid #ccc}.nbar,.snav{display:none}.step{display:block!important}}
</style>

function mlbar(){
  return '<div style="display:flex;height:5px"><div style="flex:1;background:var(--yellow)"></div><div style="flex:1;background:var(--pink)"></div><div style="flex:1;background:var(--cyan)"></div><div style="flex:1;background:var(--green)"></div></div>';
}
function pzb(){
  var cols=['var(--yellow)','var(--pink)','var(--cyan)','var(--green)','var(--orange)','var(--purple)','var(--yellow)'];
  var ws=[40,24,52,30,44,28,36];
  return '<div class="pzb" style="padding:0 1.75rem">'+ws.map(function(w,i){return '<div class="pz" style="background:'+cols[i%cols.length]+';width:'+w+'px"></div>';}).join('')+'</div>';
}
function dots(active){
  var h='<div class="dots">';
  for(var i=0;i<TOT;i++) h+='<div class="dot'+(i<active?' done':i===active?' active':'')+'"></div>';
  return h+'</div>';
}
function nbar(prev,next,nextLabel){
  return '<div class="nbar"><button class="btn-back" data-go="'+prev+'">← Retour</button>'+dots(prev+1)+'<button class="btn-next" data-go="'+next+'">'+nextLabel+'</button></div>';
}

function buildDomain(di){

  var h='<div class="step" id="s'+si+'">'+

    '</div>';

  d.qs.forEach(function(q){
    h+='<div class="qb">';
    h+='<div class="qlbl" style="color:'+d.c+'">'+q.lb+'</div>';
    h+='<div class="qtxt">'+q.tx+'</div>';
    if(q.ht) h+='<div class="qhint">'+q.ht+'</div>';

    if(q.t==='scale'){
      var v=A[q.id]||3;
      h+='<div class="sdis" id="sd'+q.id+'" style="background:'+q.bg+'">';
      h+='<span class="semi" id="se'+q.id+'">'+q.is[v-1]+'</span>';
      h+='<span class="slbl" id="sl'+q.id+'" style="color:'+d.c+'">'+q.ls[v-1]+'</span>';
      h+='</div>';
      h+='<input type="range" min="1" max="5" step="1" value="'+v+'" class="js-scale" data-qid="'+q.id+'" data-di="'+di+'">';
      h+='<div class="sticks"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>';
    } else if(q.t==='forces'){
      h+='<div class="chip-grid" id="cg-'+q.id+'">';
      FORCES_DATA.forEach(function(f,fi){
        var k='forces_'+fi;
        var sel=A[k]||false;
        h+='<div class="fchip'+(sel?' fc-sy':'')+'" id="fc-'+k+'" data-action="chip" data-pool="forces" data-idx="'+fi+'" data-selcls="fc-sy">';
        h+='<span class="fchip-icon">'+f.i+'</span>'+f.l+'</div>';
      });
      h+='</div>';
    } else if(q.t==='besoins'){
      h+='<div class="chip-grid" id="cg-'+q.id+'">';
      BESOINS_DATA.forEach(function(b,bi){
        var k='besoins_'+bi;
        var sel=A[k]||false;
        h+='<div class="fchip'+(sel?' fc-sr':'')+'" id="fc-'+k+'" data-action="chip" data-pool="besoins" data-idx="'+bi+'" data-selcls="fc-sr">';
        h+='<span class="fchip-icon">'+b.i+'</span>'+b.l+'</div>';
      });
      h+='</div>';
    } else if(q.t==='valeurs'){
      h+='<div class="chip-grid" id="cg-'+q.id+'">';
      VALEURS_DATA.forEach(function(v,vi){
        var k='valeurs_'+vi;
        var sel=A[k]||false;
        h+='<div class="fchip'+(sel?' fc-sp':'')+'" id="fc-'+k+'" data-action="chip" data-pool="valeurs" data-idx="'+vi+'" data-selcls="fc-sp">';
        h+='<span class="fchip-icon">'+v.i+'</span>'+v.l+'</div>';
      });
      h+='</div>';
    } else {
      var isM=q.t==='multi';
      h+='<div class="og'+(q.os.length===3?' c3':'')+'">';
      q.os.forEach(function(o,oi){
        var k=q.id+'_'+oi;
        var sel=isM?(A[k]||false):(A[q.id]===oi);
        var selClass=sel?' '+d.sc:'';
        h+='<div class="oc'+selClass+'" id="oc'+k+'"';
        h+=' data-action="'+(isM?'multi':'single')+'"';
        h+=' data-qid="'+q.id+'" data-idx="'+oi+'" data-sc="'+d.sc+'" data-tot="'+q.os.length+'">';
        h+='<div class="oemi">'+o.i+'</div>';
        h+='<div class="olbl">'+o.l+'</div>';
        if(o.d) h+='<div class="odesc">'+o.d+'</div>';
        h+='</div>';
      });
      h+='</div>';
    }

  h+=pzb()+nbar(si-1,si+1,isLast?'Dernière étape →':'Suite →')+mlbar()+'</div>';

function fillResults(){
  // Atouts
  var atouts=[];
  if(Object.keys(A).some(function(k){return k.startsWith('c2_')&&A[k];})) atouts.push({i:'⭐',t:'Des expériences à valoriser'});
  if(A.c3===0) atouts.push({i:'🎯',t:'Un projet professionnel défini'});
  if(A.f2_0&&A.f2_1) atouts.push({i:'📄',t:'CV et lettre de motivation maîtrisés'});
  if((A.c1||3)>=4) atouts.push({i:'🦁',t:'Une belle confiance en toi'});
  if((A.p1||3)>=4) atouts.push({i:'☀️',t:'Un bon état d\'esprit pour avancer'});
  if((A.s1||3)>=4) atouts.push({i:'🚀',t:'De l\'énergie et de la forme'});
  if(A['r2_3']||A['r2_4']) atouts.push({i:'💻',t:'Connecté(e) pour tes démarches'});
  if(A['r2_0']||A['r2_2']) atouts.push({i:'🚗',t:'Autonome pour te déplacer'});

  var aHtml='<div class="bilan-intro"><b>Merci d\'avoir répondu !</b><br>Voici ce que ton conseiller pourra aborder avec toi. C\'est un point de départ, pas un verdict — chaque parcours est unique.</div>';

  // Forces cochées
  var selForces=FORCES_DATA.filter(function(_,i){return A['forces_'+i];});
  if(selForces.length){

  if(A.s3===2) points.push({i:'💊',t:'Santé et quotidien'});
  if(!A['r2_0']&&!A['r2_2']) points.push({i:'🚗',t:'Mobilité et déplacements'});
  if((A.p1||3)<=2||A.p3===2||A.p3===3) points.push({i:'🌧️',t:'Comment tu te sens en ce moment'});
  if(A.f3===2||A.f3===3) points.push({i:'📋',t:'Droits et démarches administratives'});
  if(A.f4_0||A.f4_1||A.f4_2) points.push({i:'📖',t:'Lecture, écriture ou calcul à renforcer'});
  if(points.length){
    aHtml+='<div class="sec-title" style="color:#E65100">💬 Points à explorer ensemble avec ton conseiller</div>';
    aHtml+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem">';
    points.forEach(function(p){aHtml+='<div class="pts-chip" style="background:#FFF8E1;color:#E65100">'+p.i+' '+p.t+'</div>';});
    aHtml+='</div>';
  }

  document.getElementById('r-atouts').innerHTML=aHtml;

  // Services recommandés
  var recs=[];
  var seen={};
  function addSvc(key,why){if(!seen[key]){seen[key]=1;recs.push(Object.assign({},SERVICES[key],{why:why}));}}

  if((A.p1||3)<=2||A.p3===2||A.p3===3) addSvc('demarches','Tu traverses une période difficile — la Mission Locale peut t\'aider à trouver du soutien et des ressources adaptées.');
  if(A.c3===1||A.c3===2||A.c3===3) addSvc('orientation','Tu cherches encore ta voie — c\'est tout à fait normal. L\'accompagnement orientation est fait pour ça.');
  if(A.c3===1||A.c3===2||A.c3===3) addSvc('erip','L\'ERIP Pays Basque peut t\'aider à explorer les métiers et les formations disponibles sur le territoire.');
  if(A['d_emploi']||(!A.f2_0||!A.f2_1)) addSvc('emploi','Tu veux trouver un emploi — la Mission Locale t\'accompagne avec des offres, des ateliers et un suivi personnalisé.');
  if(A['d_emploi']||A['d_candi']||(!A.f2_0||!A.f2_1)) addSvc('candidature','Préparer un bon CV et une lettre percutante, ça s\'apprend — on peut t\'y aider pas à pas.');
  if(A['d_former']||A.f1===2||A.f1===3) addSvc('formation','Tu veux te (re)former — la Mission Locale t\'aide à trouver la formation qui te correspond et à la financer.');
  if(A['d_inter']) addSvc('international','Tu veux bouger à l\'étranger — la Mission Locale Pays Basque t\'accompagne pour concrétiser ce projet.');
  if(!A['r2_0']&&!A['r2_2']) addSvc('mobilite','Te déplacer peut être un frein — la Mission Locale peut t\'aider à trouver des solutions : permis, transports, aides.');
  if(A.s3===2||!A['s2_0']||!A['s2_2']) addSvc('sante','La Mission Locale peut t\'orienter vers des professionnels de santé et t\'aider à accéder aux soins.');
  if(A.f3===2||A.f3===3||(A.r3||3)<=2||A.r1===3) addSvc('demarches','Des aides financières ou administratives existent peut-être pour toi — un conseiller peut faire le point.');
  if(A.f4_4||(!A['r2_3']&&!A['r2_4'])) addSvc('numerique','La Mission Locale peut t\'aider à accéder aux outils numériques et à les utiliser pour tes démarches.');
  if((!A.f2_0&&!A.f2_1)&&(A.f1===2||A.f1===3)) addSvc('cej','Le Contrat d\'Engagement Jeunes (CEJ) peut te proposer un accompagnement intensif avec une allocation — renseigne-toi !');
  // CléA — recommander si fragilités détectées sur les 6 domaines
  var cleaFrag=[(A.k1||3)<=2,(A.k2||3)<=2,(A.k3||3)<=2,(A.k4||3)<=2,(A.k5||3)<=2,(A.k6||3)<=2].filter(Boolean).length;
  if(cleaFrag>=2) addSvc('clea','Plusieurs compétences clés sont encore en cours de construction — c\'est tout à fait normal. La certification CléA peut t\'aider à les travailler et les faire reconnaître officiellement.');
  else if(cleaFrag===1) addSvc('clea','Une compétence clé mérite un peu plus de pratique. La Mission Locale peut t\'accompagner pour la renforcer, avec la certification CléA si tu le souhaites.');
  if(!recs.length) addSvc('orientation','Ton conseiller Mission Locale sera le mieux placé pour t\'orienter vers les bons outils et dispositifs.');

  var ext='<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
  var sHtml='<div class="sec-title" style="color:#C62828">💡 Ce que la Mission Locale peut faire pour toi</div>';
  recs.forEach(function(s){
    sHtml+='<div class="serv-card" style="background:'+s.bg+'">';
    sHtml+='<div class="serv-icon">'+s.icon+'</div>';
    sHtml+='<div class="serv-body">';
    sHtml+='<div class="serv-title" style="color:'+s.tc+'">'+s.title+'</div>';
    sHtml+='<div class="serv-desc">'+s.why+'</div>';
    sHtml+='<a href="'+s.url+'" target="_blank" class="serv-link" style="background:'+s.lbg+';color:#fff">'+ext+' '+s.label+'</a>';
    sHtml+='</div></div>';
  });
  document.getElementById('r-services').innerHTML=sHtml;

  // Bilan CléA visuel
  var cleaDomains=[
    {id:'k1',lb:'Lire et écrire',i:'📖'},
    {id:'k2',lb:'Calcul',i:'🔢'},
    {id:'k3',lb:'Numérique',i:'💻'},
    {id:'k4',lb:'Travail en équipe',i:'🤝'},
    {id:'k5',lb:'Autonomie',i:'💪'},
    {id:'k6',lb:'Apprendre',i:'🎯'}
  ];
  var cleaHtml='<div class="sec-title" style="color:#1B5E20">🔑 Mes compétences clés — auto-positionnement CléA</div>';
  cleaHtml+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">';
  var cleaLabels=['Je cherche mes marques','A pratiquer davantage','Je me débrouille','A l\'aise','Très à l\'aise'];
  var cleaColors=['#FB8C00','#FDD835','#A5D6A7','#66BB6A','#2E7D32'];
  cleaDomains.forEach(function(cd){
    var v=A[cd.id]||3;
    var col=cleaColors[v-1];
    var lbl=cleaLabels[v-1];
    cleaHtml+='<div style="background:#E8F5E9;border-radius:12px;padding:10px 8px;text-align:center;">';
    cleaHtml+='<div style="font-size:18px;margin-bottom:4px">'+cd.i+'</div>';
    cleaHtml+='<div style="font-family:Nunito,sans-serif;font-weight:800;font-size:10px;color:#1B5E20;margin-bottom:4px">'+cd.lb+'</div>';
    cleaHtml+='<div style="background:'+col+';border-radius:8px;padding:2px 6px;font-size:10px;font-weight:700;color:#fff;display:inline-block">'+lbl+'</div>';
    cleaHtml+='</div>';
  });
  cleaHtml+='</div>';
  document.getElementById('r-clea').innerHTML=cleaHtml;

  // Destinations
  var selDests=DT.filter(function(d){return A['d_'+d.id];});
  if(selDests.length){
    var dHtml='<div class="sec-title" style="color:#4A148C">🧭 Ton projet en tête</div>';
    dHtml+='<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem">';
    selDests.forEach(function(d){dHtml+='<div class="pts-chip" style="background:'+d.bg+';color:'+d.tc+'">'+d.i+' '+d.n+'</div>';});
    dHtml+='</div>';
    document.getElementById('r-dest').innerHTML=dHtml;
  }

  // RDV
  document.getElementById('r-rdv').innerHTML=
    '<div class="rdv-block">'+
    '<div style="font-family:Nunito,sans-serif;font-weight:900;font-size:18px;color:var(--white);margin-bottom:6px">Prêt(e) à rencontrer ton conseiller ?</div>'+
    '<div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:16px;line-height:1.55">Apporte ce bilan à ton premier rendez-vous — il sera le point de départ de ton accompagnement.</div>'+
    '<a href="https://www.missionlocale-paysbasque.org/contact" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:var(--yellow);color:var(--black);font-family:Nunito,sans-serif;font-weight:900;font-size:14px;padding:12px 26px;border-radius:25px;text-decoration:none;border:2px solid var(--yellow);box-shadow:3px 3px 0 rgba(255,255,255,.3)">📅 Prendre rendez-vous</a>'+
    '</div>';
}

// ============================================================
// NAVIGATION
// ============================================================
function goTo(idx){
  document.querySelectorAll('.step').forEach(function(s){s.classList.remove('active');});
  var t=document.getElementById('s'+idx);
  if(t){t.classList.add('active');cur=idx;window.scrollTo(0,0);}
  if(idx===TOT-1) fillResults();
}

// ============================================================
// INIT
// ============================================================
function init(){
  var sw=document.getElementById('sw');
  var h=buildWelcome();
  DOM.forEach(function(_,i){h+=buildDomain(i);});
  h+=buildDest();
  h+=buildResult();
  sw.innerHTML=h;

  // Un seul listener sur document (pas sw) pour tout capturer
  document.addEventListener('click',function(e){
    // Navigation (boutons data-go)
    var goEl=e.target.closest('[data-go]');
    if(goEl){
      e.preventDefault();
      goTo(parseInt(goEl.dataset.go));
      return;
    }

    // Chips forces / besoins / valeurs
    var chip=e.target.closest('.fchip[data-action="chip"]');
    if(chip){
      var pool=chip.dataset.pool;
      var idx=parseInt(chip.dataset.idx);
      var cls=chip.dataset.selcls;
      var k=pool+'_'+idx;
      A[k]=!A[k];
      chip.className='fchip'+(A[k]?' '+cls:'');
      return;
    }

    // Options (cards cliquables)
    var oc=e.target.closest('.oc[data-action]');
    if(oc){
      var action=oc.dataset.action;
      var qid=oc.dataset.qid;
      var idx=parseInt(oc.dataset.idx);
      var sc=oc.dataset.sc;
      var tot=parseInt(oc.dataset.tot);

      if(action==='single'){
        A[qid]=idx;
        for(var i=0;i<tot;i++){
          var el=document.getElementById('oc'+qid+'_'+i);
          if(el) el.className='oc'+(i===idx?' '+sc:'');
        }
      } else if(action==='multi'){
        var k=qid+'_'+idx;
        A[k]=!A[k];
        oc.className='oc'+(A[k]?' '+sc:'');
      }
      return;
    }

    // Destinations
    var dc=e.target.closest('.dc2[data-action="dest"]');
    if(dc){
      var did=dc.dataset.did;
      var dt=DT.find(function(d){return d.id===did;});
      A['d_'+did]=!A['d_'+did];
      dc.className='dc2'+(A['d_'+did]?' sel':'');
      dc.style.borderColor=A['d_'+did]?dt.bc:'transparent';
      return;
    }
  });

  // Sliders
  // Construire un index global qid -> {is, ls, color} pour tous les scales
  var SCALE_META={};
  DOM.forEach(function(d){
    d.qs.forEach(function(q){
      if(q.t==='scale') SCALE_META[q.id]={is:q.is,ls:q.ls,c:d.c};
    });
  });

  document.addEventListener('input',function(e){
    if(!e.target.classList.contains('js-scale')) return;
    var qid=e.target.dataset.qid;
    var v=parseInt(e.target.value);
    var meta=SCALE_META[qid];
    if(!meta) return;
    A[qid]=v;
    var se=document.getElementById('se'+qid);
    var sl=document.getElementById('sl'+qid);
    if(se) se.textContent=meta.is[v-1];
    if(sl){sl.textContent=meta.ls[v-1];sl.style.color=meta.c;}
  });
}

init();
</script>
